<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Mobile Store</title>
    <style>
        body { 
            background-color: #f0f0f0; 
            font-family: Arial, sans-serif; 
            line-height: 1.6;
        }
        header h1 { color: #003366; }
        address { font-style: normal; }
        .contato-item { margin-bottom: 10px; }
        .label { font-weight: bold; }
    </style>
</head>

<body>

<header>
    <h1>Contato</h1>
</header>

<nav aria-label="Navegação principal">
    <ul>
        <li><a href="index.html">Início</a></li>
    </ul>
</nav>

<main>
    <section>
        <h2>Fale Conosco</h2>
        
        <address>
            <div class="contato-item">
                <span class="label">Email:</span> 
                <a href="mailto:loja@email.com">mobileStore@gmail.com</a>
            </div>
            
            <div class="contato-item">
                <span class="label">Telefone:</span> 
                <a href="tel:34999999999">(11) 97098-6396</a>
            </div>
        </address>

        <figure>
            <img src="imagens/suporte_img.webp" alt="Atendente de suporte pronta para ajudar" width="300">
            <figcaption>Nossa equipe de suporte está disponível em horário comercial.</figcaption>
        </figure>
    </section>
</main>

<footer>
    <p>&copy; 2026 Mobile Store - Todos os direitos reservados.</p>
    <nav>
        <a href="index.html">Voltar ao início</a>
    </nav>
</footer>

</html>
