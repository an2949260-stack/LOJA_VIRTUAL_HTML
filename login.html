<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Loja Online</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

<header id="site-header">
    <h1>Acesso ao Sistema</h1>
</header>

<nav aria-label="Navegação secundária">
    <ul>
        <li><a href="index.html">Início</a></li>
    </ul>
</nav>

<main>
    <section class="card login-container">
        <h2>Identifique-se</h2>
        
        <form action="/login" method="POST" class="needs-validation">
            <input type="hidden" name="_form" value="login">
            
            <div class="form-group text-left">
                <label for="usuario">Usuário:</label>
                <input type="text" id="usuario" name="usuario" required autocomplete="username" aria-label="Usuário" placeholder="Digite seu usuário">
            </div>

            <div class="form-group text-left">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" name="senha" required autocomplete="current-password" aria-label="Senha" placeholder="Digite sua senha">
            </div>

            <div class="form-group" style="margin-top: 20px;">
                <button type="submit" class="btn">Entrar</button>
            </div>
        </form>

        <hr style="border: 0; border-top: 1px solid #e6e6e6; margin: 25px 0;">

        <aside style="width: 100%; display: flex; justify-content: center;">
            <figure style="margin: 0; padding: 0; text-align: center; max-width: 320px; width: 100%;">
                <img class="responsive-img" src="https://static.vecteezy.com/system/resources/previews/000/185/753/large_2x/modern-login-form-interface-design-with-username-and-password-vector.jpg" alt="Cadeado digital simbolizando segurança no login" style="width: 100%; height: auto; border-radius: 6px; display: block; margin: 0 auto;">
                <figcaption class="muted" style="margin-top: 10px;">Seu acesso é protegido por criptografia.</figcaption>
            </figure>
        </aside>
    </section>
</main>

<footer>
    <p>&copy; 2026 Mobile Store - Área Administrativa</p>
</footer>

</body>
</html>
