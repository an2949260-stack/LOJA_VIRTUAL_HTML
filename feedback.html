<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Mobile Store</title>
    <style>
        body { 
            background-color: #f0f0f0; 
            font-family: Arial, sans-serif; 
            line-height: 1.6;
            color: #333;
        }
        header h1 { color: #003366; }
        .instrucoes { margin-bottom: 20px; color: #555; }
        .campo-form { margin-top: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        textarea { width: 100%; max-width: 400px; height: 100px; display: block; }
        button { margin-top: 10px; cursor: pointer; }
    </style>
</head>

<body>

<header>
    <h1>Feedback</h1>
</header>

<nav aria-label="Navegação principal">
    <ul>
        <li><a href="index.html">Início</a></li>
    </ul>
</nav>

<main>
    <section>
        <header>
            <h2>Sua opinião é fundamental</h2>
            <div class="instrucoes">
                <p>Deixe sua opinião sobre nossa loja.</p>
                <p>Sua avaliação nos ajuda a melhorar cada vez mais!</p>
            </div>
        </header>

        <form action="/enviar-feedback" method="POST">
            <div class="campo-form">
                <label for="mensagem-feedback">Sua Mensagem:</label>
                <textarea id="mensagem-feedback" name="feedback" required placeholder="Digite aqui seu comentário..."></textarea>
            </div>

            <button type="submit">Enviar Avaliação</button>
        </form>

        <figure>
            <img src="https://blog.spvale.com.br/wp-content/uploads/2023/04/post_thumbnail-c8230c3094bad7e8519eb31f95beefd7.jpeg" alt="Ilustração representando a coleta de opiniões dos clientes" width="300">
            <figcaption>Agradecemos por dedicar seu tempo para nos avaliar.</figcaption>
        </figure>
    </section>
</main>

<footer>
    <p>&copy; 2026 Mobile Store - Todos os direitos reservados.</p>
    <nav>
        <a href="index.html">Voltar ao início</a>
    </nav>
</footer>

</body>
</html>
