<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <style>
        /* O estilo deve ficar preferencialmente em um arquivo .css ou aqui */
        body { background-color: #f0f0f0; font-family: sans-serif; }
        h1 { color: #003366; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
    </style>
</head>

<body>

<header>
    <h1>Cadastro de Cliente</h1>
</header>

<nav>
    <ul>
        <li><a href="index.html">Início</a></li>
    </ul>
</nav>

<main>
    <article>
        <section>
            <h2>Dados Pessoais</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="tel">Telefone:</label>
                    <input type="tel" id="tel" name="tel">
                </div>

                <button type="submit">Cadastrar</button>
            </form>
        </section>

        <aside>
            <figure>
                <img src="imagens/cliente_img.webp" alt="Ilustração de um cliente satisfeito" width="300">
                <figcaption>Imagem ilustrativa de perfil de cliente.</figcaption>
            </figure>
        </aside>
    </article>
</main>

<footer>
    <p>&copy; 2026 Mobile Store. Todos os direitos reservados.</p>
    <nav>
        <a href="index.html">Voltar para o topo</a>
    </nav>
</footer>

</body>
</html>
