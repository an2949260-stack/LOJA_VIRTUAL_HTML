<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produto | Mobile Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

<header>
    <h1>Cadastro de Produto</h1>
</header>

<nav aria-label="Navegação principal">
    <ul>
        <li><a href="index.html">Início</a></li>
    </ul>
</nav>

<main>
    <section>
        <h2>Informações do Produto</h2>
        
        <form action="/cadastrar-produto" method="POST" class="needs-validation">
            <input type="hidden" name="_form" value="cadastro-produto">
            <div class="campo">
                <label for="nome-produto">Nome do Produto:</label>
                <input type="text" id="nome-produto" name="nome" required>
            </div>

            <div class="campo">
                <label for="categoria-produto">Categoria:</label>
                <input type="text" id="categoria-produto" name="categoria" required>
            </div>

            <div class="campo">
                <label for="preco-produto">Preço (R$):</label>
                <input type="number" id="preco-produto" name="preco" step="0.01" required>
            </div>

            <div class="campo">
                <label for="estoque-produto">Quantidade em estoque:</label>
                <input type="number" id="estoque-produto" name="estoque" min="0" required>
            </div>

            <div class="campo">
                <label for="fornecedor-produto">Fornecedor:</label>
                <input type="text" id="fornecedor-produto" name="fornecedor" required>
            </div>

            <div class="campo">
                <label for="descricao-produto">Descrição:</label>
                <textarea id="descricao-produto" name="descricao" rows="4" required></textarea>
            </div>

            <button type="submit">Finalizar Cadastro</button>
        </form>

        <figure>
            <img src="https://m.media-amazon.com/images/I/71K4CkU04bL._AC_SL1500_.jpg" alt="Foto do produto a ser cadastrado" width="300">
            <figcaption>Prévia da imagem do produto.</figcaption>
        </figure>
    </section>
</main>

<footer>
    <p>&copy; 2026 Mobile Store - Todos os direitos reservados.</p>
    <a href="index.html">Voltar ao início</a>
</footer>

</body>
</html>
