<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos Disponíveis | Mobile Store</title>
    <style>
        body { 
            background-color: #f0f0f0; 
            font-family: Arial, sans-serif; 
            color: #333;
            line-height: 1.6;
        }
        h1, h2 { color: #003366; }
        
        /* Estilização da Tabela */
        table { 
            width: 100%; 
            max-width: 500px; 
            border-collapse: collapse; 
            background-color: #fff;
            margin: 20px 0;
        }
        th, td { 
            border: 1px solid #ccc; 
            padding: 12px; 
            text-align: left; 
        }
        th { 
            background-color: #003366; 
            color: white; 
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>

<body>

<header>
    <h1>Produtos Disponíveis</h1>
</header>

<nav aria-label="Navegação principal">
    <ul>
        <li><a href="index.html">Início</a></li>
    </ul>
</nav>

<main>
    <section>
        <h2>Catálogo de Itens</h2>
        
        <table>
            <caption>Lista de periféricos e hardwares com preços atualizados</caption>
            <thead>
                <tr>
                    <th scope="col">Produto</th>
                    <th scope="col">Preço</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Notebook</td>
                    <td>R$ 3.500,00</td>
                </tr>
                <tr>
                    <td>Mouse</td>
                    <td>R$ 80,00</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td colspan="2">Consulte condições de parcelamento.</td>
                </tr>
            </tfoot>
        </table>

        <figure>
            <img src="https://b2ti.com.br/unidades-de-negocio-e-produtos/wp-content/uploads/2022/11/home-page-banner-para-mobile-b2ti-1080x720-_1_.webp" alt="Conjunto de equipamentos de informática em exposição" width="300">
            <figcaption>Produtos em destaque nesta semana.</figcaption>
        </figure>
    </section>
</main>

<footer>
    <p>&copy; 2026 Mobile Store - Preços válidos enquanto durarem os estoques.</p>
    <nav>
        <a href="index.html">Voltar ao início</a>
    </nav>
</footer>

</body>
</html>
